name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.1.1'

      - name: Download YOLOv8n TFLite model
        run: |
          mkdir -p app/src/main/assets
          curl -L "https://github.com/ultralytics/assets/releases/download/v0.0.0/yolov8n_float32.tflite" \
            -o app/src/main/assets/yolov8n.tflite
          ls -lh app/src/main/assets/

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore objectlens.keystore \
            -alias objectlens \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass objectlens123 -keypass objectlens123 \
            -dname "CN=ObjectLens,OU=Dev,O=ObjectLens,L=Colombo,S=WP,C=LK"

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace
        working-directory: ${{ github.workspace }}

      - name: Build Release APK signed
        run: |
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/objectlens.keystore \
            -Pandroid.injected.signing.store.password=objectlens123 \
            -Pandroid.injected.signing.key.alias=objectlens \
            -Pandroid.injected.signing.key.password=objectlens123 \
            --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ObjectLens-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK SIGNED
        uses: actions/upload-artifact@v4
        with:
          name: ObjectLens-release-SIGNED
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
